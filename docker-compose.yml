services:
  grimoire-db:
    container_name: grimoire-db
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - ${GRIMOIRE_DATA_PATH}/postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - grimoire-network

  grimoire-backend:
    container_name: grimoire-backend
    build: ./backend
    restart: always
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - grimoire-db
    networks:
      - grimoire-network

  grimoire-frontend:
    container_name: grimoire-frontend
    env_file:
      - .env
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    ports:
      - '8089:3000'
    depends_on:
      - grimoire-backend
    networks:
      - grimoire-network

networks:
  grimoire-network:
    driver: bridge
